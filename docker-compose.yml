services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  python-engine:
    build: ./ai-engine-python
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
      STORAGE_UPLOAD_DIR: /app/uploads
      MODEL_PATH: /app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build: ./backend-springboot
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      python-engine:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/ai_analytics
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DRIVER: org.postgresql.Driver
      JPA_DDL_AUTO: update
      H2_CONSOLE_ENABLED: "false"
      PYTHON_ENGINE_URL: http://python-engine:8000
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      JWT_SECRET: docker-dev-secret-key-min-32-characters-long
      STORAGE_UPLOAD_DIR: /app/uploads
      AI_PROVIDER_KEY: ${AI_PROVIDER_KEY:-}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./fronted-react
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
  uploads_data:

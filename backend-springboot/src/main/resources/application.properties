spring.application.name=ai-analytics-backend
server.port=${PORT:${SERVER_PORT:8080}}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# Supports both DB_URL and DATABASE_URL (Render-style) env vars
spring.datasource.url=${DB_URL:${DATABASE_URL:jdbc:h2:mem:backenddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}}
spring.datasource.username=${DB_USERNAME:${DATABASE_USERNAME:sa}}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# HikariCP connection pool (production-ready defaults)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
python.engine.url=${PYTHON_ENGINE_URL:http://localhost:8000}
ai.provider.url=${AI_PROVIDER_URL:https://openrouter.ai/api/v1/chat/completions}
ai.provider.model=${AI_PROVIDER_MODEL:openai/gpt-4o-mini}
ai.provider.key=${AI_PROVIDER_KEY:}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
logging.level.com.ai.backend=${APP_LOG_LEVEL:INFO}

jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

storage.upload-dir=${STORAGE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

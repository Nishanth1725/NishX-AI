# NexusAI — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nexusai-python-engine
    runtime: docker
    dockerfilePath: ./ai-engine-python/Dockerfile
    dockerContext: ./ai-engine-python
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYSPARK_PYTHON
        value: python3
      - key: PYSPARK_DRIVER_PYTHON
        value: python3
      - key: STORAGE_UPLOAD_DIR
        value: /app/uploads
      - key: MODEL_PATH
        value: /app/models
      - key: DATABASE_URL
        sync: false

  - type: web
    name: nexusai-backend
    runtime: docker
    dockerfilePath: ./backend-springboot/Dockerfile
    dockerContext: ./backend-springboot
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DDL_AUTO
        value: update
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: PYTHON_ENGINE_URL
        fromService:
          name: nexusai-python-engine
          type: web
          property: url
      - key: AI_PROVIDER_URL
        value: https://openrouter.ai/api/v1/chat/completions
      - key: AI_PROVIDER_MODEL
        value: openai/gpt-4o-mini
      - key: AI_PROVIDER_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: STORAGE_UPLOAD_DIR
        value: /app/uploads
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

statics:
  - name: nexusai-frontend
    repo: https://github.com/Nishanth1725/NishX-AI # Explicitly matches the root repo context
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false
